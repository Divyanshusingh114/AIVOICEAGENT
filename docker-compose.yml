version: '3.8'

services:
  app:
    build:
      context: .
      args:
        - GEMINI_API_KEY=${GEMINI_API_KEY}
    image: kredmint-ai-voiceagent
    container_name: kredmint-ai-voiceagent
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/prod.db
      - NGROK_URL=${NGROK_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AP_KEY=${GEMINI_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - ELEVENLABS_AGENT_ID=${ELEVENLABS_AGENT_ID}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - PLIVO_AUTH_ID=${PLIVO_AUTH_ID}
      - PLIVO_AUTH_TOKEN=${PLIVO_AUTH_TOKEN}
      - PLIVO_PHONE_NUMBER=${PLIVO_PHONE_NUMBER}
    volumes:
      - ./data:/data
    env_file:
      - .env
    # Production: Auto-restart if unresponsive (30s check, 3 retries)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Use init process to handle signals correctly (zombie reaping)
    init: true

volumes:
  data:
